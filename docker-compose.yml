version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml' # map the configuration file
      - '--storage.tsdb.path=/prometheus' # store data in the /prometheus (in container)
      - '--storage.tsdb.retention.time=5d' # keep data for 5 days
      - '--storage.tsdb.retention.size=3GB' # limit data to 3GB

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    user: "472"
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/provisioning/dashboards_json:/var/lib/grafana/dashboards
    environment:
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=smtp.gmail.com:587
      - GF_SMTP_USER=24521899@gm.uit.edu.vn
      - GF_SMTP_PASSWORD=sfvnazgimjwtbqhe  
      - GF_SMTP_FROM_ADDRESS=24521899@gm.uit.edu.vn
      - GF_SMTP_FROM_NAME=Grafana
      - GF_SMTP_SKIP_VERIFY=false
      - GF_SMTP_STARTTLS_POLICY=MandatoryStartTLS

  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml
      - ./loki-data:/var/lib/loki

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
