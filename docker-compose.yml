version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml' # map the configuration file
      - '--storage.tsdb.path=/prometheus' # store data in the /prometheus (in container)
      - '--storage.tsdb.retention.time=5d' # keep data for 5 days
      - '--storage.tsdb.retention.size=3GB' # limit data to 3GB

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards_json:/var/lib/grafana/dashboards

volumes:
  prometheus_data:
  grafana_data:
